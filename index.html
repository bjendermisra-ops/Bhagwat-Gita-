<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a0033">
    <title>Bhagavad Gita - Premium</title>
    <link rel="manifest" href="manifest.json">
    
    <style>
        /* PREMIUM SPIRITUAL THEME CSS */
        :root {
            --bg-dark: #0a0014;
            --bg-panel: rgba(43, 10, 69, 0.6);
            --gold: #ffd700;
            --gold-glow: rgba(255, 215, 0, 0.3);
            --text-main: #f4e8ff;
            --text-muted: #b8a2c8;
            --glass-border: rgba(255, 215, 0, 0.15);
            --accent: #6b21a8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark); color: var(--text-main); line-height: 1.6;
            overflow-x: hidden; background-image: radial-gradient(circle at 50% 0%, #2b0a45 0%, var(--bg-dark) 70%);
            background-attachment: fixed;
        }

        /* Header */
        header {
            position: sticky; top: 0; background: rgba(10, 0, 20, 0.85);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        
        .app-title { color: var(--gold); font-size: 1.3rem; font-weight: bold; text-decoration: none; text-shadow: 0 0 10px var(--gold-glow);}

        /* CUSTOM PREMIUM LANGUAGE DROPDOWN */
        .lang-dropdown { position: relative; display: inline-block; }
        .lang-btn {
            background: rgba(255, 215, 0, 0.1); border: 1px solid var(--gold); color: var(--gold);
            padding: 6px 15px; border-radius: 20px; font-size: 0.95rem; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.3s;
        }
        .lang-btn:active { transform: scale(0.95); }
        .lang-menu {
            display: none; position: absolute; right: 0; top: 120%;
            background: rgba(20, 5, 40, 0.95); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8); overflow: hidden; z-index: 300; min-width: 130px;
            animation: dropFade 0.3s ease;
        }
        @keyframes dropFade { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .lang-menu.show { display: block; }
        .lang-item {
            padding: 12px 20px; color: var(--text-main); font-size: 1rem; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }
        .lang-item:last-child { border-bottom: none; }
        .lang-item:hover, .lang-item.active { background: rgba(255, 215, 0, 0.15); color: var(--gold); }

        /* Glassmorphism Cards */
        .glass-card {
            background: var(--bg-panel); border: 1px solid var(--glass-border);
            border-radius: 15px; padding: 20px; margin-bottom: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); backdrop-filter: blur(5px);
        }

        /* App Container & Views */
        #app-container { padding: 20px; padding-bottom: 80px; }
        .view { display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Search */
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input {
            flex: 1; padding: 15px; border-radius: 10px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border); color: white; font-size: 1rem; outline: none;
        }
        .search-box input:focus { border-color: var(--gold); box-shadow: 0 0 10px var(--gold-glow); }
        .btn {
            background: linear-gradient(135deg, var(--gold), #b8860b); color: #000; border: none;
            padding: 12px 20px; border-radius: 10px; font-weight: bold; font-size: 1rem; cursor: pointer;
            box-shadow: 0 4px 15px var(--gold-glow); transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.95); }

        /* Home Grid */
        .chapter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .chapter-card { text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .chapter-card:active { transform: scale(0.95); background: rgba(255,215,0,0.1); }
        .ch-num { font-size: 2rem; color: var(--gold); font-weight: bold; margin-bottom: 5px; }

        /* Verse */
        .verse-sanskrit { font-size: 1.4rem; color: var(--gold); text-align: center; margin-bottom: 15px; font-weight: bold; }
        .verse-transliteration { font-size: 1rem; color: var(--text-muted); text-align: center; font-style: italic; margin-bottom: 20px; }
        .verse-translation { font-size: 1.1rem; line-height: 1.8; margin-bottom: 20px; }
        
        details.tatparya { background: rgba(0,0,0,0.3); border-radius: 10px; border: 1px solid var(--accent); margin-top: 20px; overflow: hidden; }
        details.tatparya summary { padding: 15px; color: var(--gold); font-weight: bold; cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; }
        details.tatparya summary::after { content: '▼'; font-size: 1rem; }
        details[open].tatparya summary::after { content: '▲'; }
        .tatparya-content { padding: 15px; border-top: 1px solid var(--accent); font-size: 1rem; line-height: 1.7; }

        /* Action Buttons */
        .action-row { display: flex; justify-content: space-around; margin-top: 20px; border-top: 1px solid var(--glass-border); padding-top: 15px; }
        .icon-btn { background: none; border: none; color: var(--gold); font-size: 1.5rem; cursor: pointer; }
        
        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: rgba(10, 0, 20, 0.95);
            display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--glass-border); z-index: 100;
        }
        .nav-item { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; text-align: center; cursor:pointer;}
        .nav-item.active { color: var(--gold); }
        .nav-item i { display: block; font-size: 1.2rem; margin-bottom: 3px; font-style: normal;}

        .toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000;
            padding: 10px 20px; border-radius: 20px; font-weight: bold; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1000;
        }
        .loading-spinner { text-align: center; color: var(--gold); padding: 20px; display: none;}
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <a href="#" class="app-title" onclick="app.goHome()" data-i18n="app_title">Bhagavad Gita</a>
        
        <!-- Custom Language Dropdown -->
        <div class="lang-dropdown">
            <button class="lang-btn" onclick="app.toggleLangMenu()" id="current-lang-btn">🌐 Eng ▼</button>
            <div class="lang-menu" id="lang-menu">
                <div class="lang-item" onclick="app.changeLanguage('english')">English</div>
                <div class="lang-item" onclick="app.changeLanguage('hindi')">हिंदी</div>
                <div class="lang-item" onclick="app.changeLanguage('marathi')">मराठी</div>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div id="app-container">

        <!-- HOME VIEW -->
        <div id="view-home" class="view active">
            <div class="glass-card">
                <h3 style="color:var(--gold); margin-bottom: 10px;" data-i18n="quick_jump">Quick Verse Jump</h3>
                <div class="search-box">
                    <input type="text" id="quick-search" placeholder="e.g. 2.47" data-i18n-placeholder="search_placeholder">
                    <button class="btn" onclick="app.quickJump()" data-i18n="btn_go">Go</button>
                </div>
            </div>

            <div class="glass-card" style="cursor:pointer;" onclick="app.openVerse(2, 47)">
                <h4 style="color:var(--text-muted);" data-i18n="daily_verse_title">Daily Verse (2.47)</h4>
                <p style="margin-top:10px; font-style:italic;" id="daily-verse-text">"You have a right to perform your prescribed duty..."</p>
            </div>

            <h3 style="margin: 20px 0 10px 0; color:var(--gold);" data-i18n="chapters">Chapters</h3>
            <div class="chapter-grid" id="chapter-list">
                <!-- Chapters injected by JS -->
            </div>
        </div>

        <!-- CHAPTER VIEW -->
        <div id="view-chapter" class="view">
            <div class="glass-card">
                <button class="btn" style="padding: 5px 10px; margin-bottom: 15px;" onclick="app.goBack()" data-i18n="btn_back">← Back</button>
                <h2 id="chapter-title" style="color:var(--gold);">Chapter 1</h2>
                <div class="loading-spinner" id="chapter-loading" data-i18n="loading">Loading Verses...</div>
                <div id="verse-list" style="margin-top: 20px; display:flex; flex-direction:column; gap:10px;">
                    <!-- Verses injected by JS -->
                </div>
            </div>
        </div>

        <!-- VERSE VIEW -->
        <div id="view-verse" class="view">
            <div class="glass-card">
                <button class="btn" style="padding: 5px 10px; margin-bottom: 15px;" onclick="app.goBack()" data-i18n="btn_back">← Back</button>
                <h3 id="verse-heading" style="color:var(--gold); text-align:center; margin-bottom: 20px;">BG 1.1</h3>
                
                <div id="verse-sanskrit" class="verse-sanskrit"></div>
                <div id="verse-transliteration" class="verse-transliteration"></div>
                
                <div style="border-top: 1px solid var(--glass-border); padding-top: 15px;">
                    <strong style="color:var(--gold);" data-i18n="translation">Translation</strong>
                    <div id="verse-translation" class="verse-translation"></div>
                </div>

                <details class="tatparya" id="tatparya-container">
                    <summary data-i18n="show_tatparya">Show Tatparya (Purport)</summary>
                    <div class="tatparya-content" id="verse-tatparya"></div>
                </details>

                <div class="action-row">
                    <button class="icon-btn" onclick="app.prevVerse()">◀</button>
                    <button class="icon-btn" id="btn-bookmark" onclick="app.toggleBookmark()">🔖</button>
                    <button class="icon-btn" onclick="app.copyVerse()">📋</button>
                    <button class="icon-btn" onclick="app.nextVerse()">▶</button>
                </div>
            </div>
        </div>

        <!-- BOOKMARKS VIEW -->
        <div id="view-bookmarks" class="view">
            <div class="glass-card">
                <h2 style="color:var(--gold); margin-bottom:20px;" data-i18n="bookmarks_title">Saved Bookmarks</h2>
                <div id="bookmark-list" style="display:flex; flex-direction:column; gap:10px;">
                    <!-- Bookmarks injected by JS -->
                </div>
            </div>
        </div>

    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="#" class="nav-item active" onclick="app.showView('home')">
            <i>🏠</i> <span data-i18n="nav_home">Home</span>
        </a>
        <a href="#" class="nav-item" onclick="app.showView('bookmarks')">
            <i>🔖</i> <span data-i18n="nav_bookmarks">Bookmarks</span>
        </a>
    </div>

    <div class="toast" id="toast">Message</div>

    <!-- APPLICATION LOGIC -->
    <script>
        // --- DICTIONARY FOR REAL-TIME TRANSLATION ---
        const i18n = {
            english: {
                lang_btn: "🌐 Eng ▼",
                app_title: "Bhagavad Gita",
                quick_jump: "Quick Verse Jump",
                search_placeholder: "e.g. 2.47 or Chapter 2 Verse 47",
                btn_go: "Go",
                daily_verse_title: "Daily Verse (2.47)",
                daily_verse_text: '"You have a right to perform your prescribed duty, but you are not entitled to the fruits of action."',
                chapters: "Chapters",
                btn_back: "← Back",
                loading: "Loading Verses...",
                translation: "Translation",
                show_tatparya: "Show Tatparya (Purport)",
                bookmarks_title: "Saved Bookmarks",
                nav_home: "Home",
                nav_bookmarks: "Bookmarks",
                chap_prefix: "Chapter",
                verse_prefix: "Verse",
                toast_lang: "Language updated to English",
                chapter_names: [
                    "Observing the Armies", "Contents of the Gita Summarized", "Karma-yoga", "Transcendental Knowledge",
                    "Karma-yoga - Action in Krishna Consciousness", "Dhyana-yoga", "Knowledge of the Absolute",
                    "Attaining the Supreme", "The Most Confidential Knowledge", "The Opulence of the Absolute",
                    "The Universal Form", "Devotional Service", "Nature, the Enjoyer, and Consciousness",
                    "The Three Modes of Material Nature", "The Yoga of the Supreme Person", "The Divine and Demoniac Natures",
                    "The Divisions of Faith", "Conclusion - The Perfection of Renunciation"
                ]
            },
            hindi: {
                lang_btn: "🌐 हिंदी ▼",
                app_title: "भगवद् गीता",
                quick_jump: "त्वरित श्लोक खोज",
                search_placeholder: "उदा. 2.47 या अध्याय 2 श्लोक 47",
                btn_go: "खोजें",
                daily_verse_title: "आज का श्लोक (2.47)",
                daily_verse_text: '"तुम्हारा अधिकार केवल कर्म करने में है, उसके फलों में कभी नहीं..."',
                chapters: "अध्याय",
                btn_back: "← पीछे",
                loading: "श्लोक लोड हो रहे हैं...",
                translation: "अनुवाद",
                show_tatparya: "तात्पर्य (व्याख्या) देखें",
                bookmarks_title: "सहेजे गए श्लोक",
                nav_home: "होम",
                nav_bookmarks: "बुकमार्क",
                chap_prefix: "अध्याय",
                verse_prefix: "श्लोक",
                toast_lang: "भाषा हिंदी में बदल गई",
                chapter_names: [
                    "कुरुक्षेत्र के युद्धस्थल में सैन्यनिरीक्षण", "गीता का सार", "कर्मयोग", "दिव्य ज्ञान",
                    "कर्मयोग - कृष्णभावनामृत में कर्म", "ध्यानयोग", "भगवद्ज्ञान", "भगवत्प्राप्ति",
                    "परम गुह्य ज्ञान", "श्रीभगवान् का ऐश्वर्य", "विराट रूप", "भक्तियोग",
                    "प्रकृति, पुरुष तथा चेतना", "प्रकृति के तीन गुण", "पुरुषोत्तम योग", "दैवी तथा आसुरी स्वभाव",
                    "श्रद्धा के विभाग", "उपसंहार - संन्यास की सिद्धि"
                ]
            },
            marathi: {
                lang_btn: "🌐 मराठी ▼",
                app_title: "भगवद् गीता",
                quick_jump: "त्वरित श्लोक शोधा",
                search_placeholder: "उदा. 2.47 किंवा अध्याय 2 श्लोक 47",
                btn_go: "शोधा",
                daily_verse_title: "आजचा श्लोक (2.47)",
                daily_verse_text: '"तुझा अधिकार केवळ कर्म करण्यात आहे, त्याच्या फळात कधीही नाही..."',
                chapters: "अध्याय",
                btn_back: "← मागे",
                loading: "श्लोक लोड होत आहेत...",
                translation: "अनुवाद",
                show_tatparya: "तात्पर्य (स्पष्टीकरण) पहा",
                bookmarks_title: "जतन केलेले श्लोक",
                nav_home: "मुख्यपृष्ठ",
                nav_bookmarks: "बुकमार्क",
                chap_prefix: "अध्याय",
                verse_prefix: "श्लोक",
                toast_lang: "भाषा मराठीत बदलली",
                chapter_names: [
                    "कुरुक्षेत्रावरील सैन्याचे निरीक्षण", "गीतेचा सारांश", "कर्मयोग", "दिव्य ज्ञान",
                    "कर्मयोग - कृष्णभावनेतील कर्म", "ध्यानयोग", "भगवद्ज्ञान", "भगवत्प्राप्ती",
                    "परम गुह्य ज्ञान", "श्रीभगवंतांचे ऐश्वर्य", "विराट रूप", "भक्तियोग",
                    "प्रकृती, पुरुष आणि चेतना", "प्रकृतीचे तीन गुण", "पुरुषोत्तम योग", "दैवी आणि आसुरी स्वभाव",
                    "श्रद्धेचे विभाग", "निष्कर्ष - संन्यासाची सिद्धी"
                ]
            }
        };

        const app = {
            lang: 'english',
            currentChapter: 1,
            currentVerse: 1,
            chapterDataCache: {}, 
            bookmarks: JSON.parse(localStorage.getItem('bg_bookmarks')) || [],
            historyStack: ['home'],

            init: function() {
                // Load Settings
                const savedLang = localStorage.getItem('bg_lang');
                if(savedLang) { this.lang = savedLang; }

                this.updateUIForLanguage(false); // Apply translations on load
                
                // Back button hardware support
                window.addEventListener('popstate', (e) => {
                    if(e.state && e.state.view) this.switchViewDOM(e.state.view);
                    else this.switchViewDOM('home');
                });

                history.replaceState({view: 'home'}, "Home", "");

                // Close lang menu if clicked outside
                window.onclick = function(event) {
                    if (!event.target.matches('.lang-btn')) {
                        let menus = document.getElementsByClassName("lang-menu");
                        for (let i = 0; i < menus.length; i++) {
                            let openDropdown = menus[i];
                            if (openDropdown.classList.contains('show')) {
                                openDropdown.classList.remove('show');
                            }
                        }
                    }
                }
            },

            // --- UI & LANGUAGE LOGIC ---

            toggleLangMenu: function() {
                document.getElementById("lang-menu").classList.toggle("show");
            },

            changeLanguage: function(newLang) {
                this.lang = newLang;
                localStorage.setItem('bg_lang', newLang);
                
                // Update everything Real-time
                this.updateUIForLanguage(true);
            },

            updateUIForLanguage: function(showToastMsg) {
                const dict = i18n[this.lang];

                // 1. Update Lang Button Text
                document.getElementById('current-lang-btn').innerText = dict.lang_btn;

                // 2. Update Static Text (data-i18n tags)
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (dict[key]) el.innerText = dict[key];
                });

                // 3. Update Placeholders
                document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                    const key = el.getAttribute('data-i18n-placeholder');
                    if (dict[key]) el.placeholder = dict[key];
                });

                // 4. Update Daily Verse Text
                document.getElementById('daily-verse-text').innerText = dict.daily_verse_text;

                // 5. Re-render Home Chapter Grid (updates names in real-time)
                this.renderChapterGrid();

                // 6. Update Active Views
                const activeView = document.querySelector('.view.active').id;
                
                if(activeView === 'view-chapter') {
                    // Update Chapter Title and Verse List Language
                    document.getElementById('chapter-title').innerText = `${dict.chap_prefix} ${this.currentChapter}`;
                    this.openChapter(this.currentChapter); // Re-fetch/render to update preview language
                } 
                else if(activeView === 'view-verse') {
                    // Instantly update current open verse translation
                    this.openVerse(this.currentChapter, this.currentVerse);
                }
                else if(activeView === 'view-bookmarks') {
                    this.renderBookmarks(); // Update "Verse" to "श्लोक" in list
                }

                if(showToastMsg) this.showToast(dict.toast_lang);
            },

            showToast: function(msg) {
                const toast = document.getElementById('toast');
                toast.innerText = msg; toast.style.opacity = '1';
                setTimeout(() => toast.style.opacity = '0', 2000);
            },

            switchViewDOM: function(viewName) {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.getElementById('view-' + viewName).classList.add('active');
                
                // Update bottom nav active state
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                if(viewName === 'home' || viewName === 'bookmarks') {
                    const navs = document.querySelectorAll('.nav-item');
                    if(viewName === 'home') navs[0].classList.add('active');
                    if(viewName === 'bookmarks') navs[1].classList.add('active');
                }
                window.scrollTo(0,0);
            },

            navigateTo: function(viewName) {
                this.historyStack.push(viewName);
                history.pushState({view: viewName}, viewName, "");
                this.switchViewDOM(viewName);
            },

            goHome: function() { this.navigateTo('home'); },
            goBack: function() { history.back(); },

            // --- DATA LOGIC ---

            renderChapterGrid: function() {
                const grid = document.getElementById('chapter-list');
                grid.innerHTML = '';
                const chapterNames = i18n[this.lang].chapter_names;
                
                for(let i = 1; i <= 18; i++) {
                    const card = document.createElement('div');
                    card.className = 'glass-card chapter-card';
                    card.innerHTML = `
                        <div class="ch-num">${i}</div>
                        <div style="font-size:0.85rem; color:var(--text-muted); padding:0 5px;">${chapterNames[i-1]}</div>
                    `;
                    card.onclick = () => { this.currentChapter = i; this.openChapter(i); };
                    grid.appendChild(card);
                }
            },

            fetchChapterData: async function(chapterNum) {
                if(this.chapterDataCache[chapterNum]) return this.chapterDataCache[chapterNum];
                try {
                    document.getElementById('chapter-loading').style.display = 'block';
                    const res = await fetch(`data/chapter${chapterNum}.json`);
                    if(!res.ok) throw new Error("Offline or File missing");
                    const data = await res.json();
                    this.chapterDataCache[chapterNum] = data; 
                    document.getElementById('chapter-loading').style.display = 'none';
                    return data;
                } catch(e) {
                    document.getElementById('chapter-loading').style.display = 'none';
                    this.showToast('Failed to load. Need Internet or JSON missing.');
                    return null;
                }
            },

            openChapter: async function(chapterNum) {
                const dict = i18n[this.lang];
                document.getElementById('chapter-title').innerText = `${dict.chap_prefix} ${chapterNum}`;
                this.navigateTo('chapter');
                
                const list = document.getElementById('verse-list');
                list.innerHTML = '';

                const verses = await this.fetchChapterData(chapterNum);
                if(!verses) return;

                verses.forEach(v => {
                    const btn = document.createElement('div');
                    btn.className = 'glass-card';
                    btn.style.padding = '15px'; btn.style.cursor = 'pointer'; btn.style.marginBottom = '0';
                    
                    // Fallback to english if native language translation is missing in JSON
                    const previewText = v[this.lang] || v.english || "";
                    
                    btn.innerHTML = `<strong style="color:var(--gold);">${dict.verse_prefix} ${v.verse_id}</strong><br><span style="font-size:0.9rem;">${previewText.substring(0, 60)}...</span>`;
                    btn.onclick = () => this.renderVerse(v);
                    list.appendChild(btn);
                });
            },

            quickJump: async function() {
                const input = document.getElementById('quick-search').value.trim();
                const match = input.match(/(\d+)[\D]+(\d+)/); 
                if(match && match[1] && match[2]) {
                    const ch = parseInt(match[1]);
                    const ve = parseInt(match[2]);
                    if(ch >= 1 && ch <= 18) { await this.openVerse(ch, ve); } 
                    else { this.showToast("Chapter must be 1-18"); }
                } else { this.showToast("Use format: 2.47"); }
            },

            openVerse: async function(ch, ve) {
                const chapterData = await this.fetchChapterData(ch);
                if(!chapterData) return;
                
                const verseData = chapterData.find(v => parseInt(v.verse) === parseInt(ve));
                if(verseData) this.renderVerse(verseData);
                else this.showToast("Verse not found");
            },

            renderVerse: function(verseData) {
                this.currentChapter = parseInt(verseData.chapter);
                this.currentVerse = parseInt(verseData.verse);
                
                document.getElementById('verse-heading').innerText = `BG ${verseData.verse_id}`;
                document.getElementById('verse-sanskrit').innerHTML = verseData.sanskrit.replace(/\n/g, '<br>');
                document.getElementById('verse-transliteration').innerHTML = verseData.transliteration.replace(/\n/g, '<br>');
                
                // Real-time language apply
                document.getElementById('verse-translation').innerText = verseData[this.lang] || verseData.english;
                
                const tatparyaKey = `tatparya_${this.lang}`;
                const tatparyaContent = verseData[tatparyaKey] || verseData.tatparya_english;
                
                const tatparyaContainer = document.getElementById('tatparya-container');
                if(tatparyaContent && tatparyaContent.trim() !== "") {
                    tatparyaContainer.style.display = 'block';
                    document.getElementById('verse-tatparya').innerHTML = tatparyaContent.replace(/\n/g, '<br><br>');
                } else { tatparyaContainer.style.display = 'none'; }

                const isBookmarked = this.bookmarks.includes(verseData.verse_id);
                document.getElementById('btn-bookmark').style.color = isBookmarked ? '#fff' : 'var(--gold)';

                localStorage.setItem('bg_last_verse', JSON.stringify({ch: this.currentChapter, ve: this.currentVerse}));
                
                if(!document.getElementById('view-verse').classList.contains('active')) {
                    this.navigateTo('verse');
                }
            },

            nextVerse: function() { this.openVerse(this.currentChapter, this.currentVerse + 1); },
            prevVerse: function() { if(this.currentVerse > 1) this.openVerse(this.currentChapter, this.currentVerse - 1); },

            toggleBookmark: function() {
                const vId = `${this.currentChapter}.${this.currentVerse}`;
                const idx = this.bookmarks.indexOf(vId);
                if(idx > -1) {
                    this.bookmarks.splice(idx, 1);
                    document.getElementById('btn-bookmark').style.color = 'var(--gold)';
                    this.showToast("Bookmark removed");
                } else {
                    this.bookmarks.push(vId);
                    document.getElementById('btn-bookmark').style.color = '#fff';
                    this.showToast("Bookmark saved");
                }
                localStorage.setItem('bg_bookmarks', JSON.stringify(this.bookmarks));
                if(document.getElementById('view-bookmarks').classList.contains('active')) this.renderBookmarks();
            },

            renderBookmarks: function() {
                const list = document.getElementById('bookmark-list');
                list.innerHTML = '';
                if(this.bookmarks.length === 0) {
                    list.innerHTML = '<p style="color:var(--text-muted)">No bookmarks yet.</p>';
                    return;
                }
                this.bookmarks.forEach(b => {
                    const arr = b.split('.');
                    const div = document.createElement('div');
                    div.className = 'glass-card';
                    div.style.padding = '15px'; div.style.cursor = 'pointer'; div.style.marginBottom = '0';
                    div.innerHTML = `<strong style="color:var(--gold);">BG ${b}</strong>`;
                    div.onclick = () => this.openVerse(parseInt(arr[0]), parseInt(arr[1]));
                    list.appendChild(div);
                });
            },

            copyVerse: function() {
                const text = `${document.getElementById('verse-heading').innerText}\n\n${document.getElementById('verse-translation').innerText}\n\n- Bhagavad Gita`;
                navigator.clipboard.writeText(text).then(() => this.showToast("Copied to clipboard"));
            },

            showView: function(view) {
                if(view === 'bookmarks') this.renderBookmarks();
                this.navigateTo(view);
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
